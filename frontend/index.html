<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Knowledge Engine</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(135deg, #020617, #0f172a);
}

/* Neon Glow */
.neon {
    box-shadow: 0 0 10px #0ea5e9, 0 0 20px #0ea5e9;
}

.neon-green {
    box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
}

/* Card */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 0 25px rgba(14,165,233,0.4);
}

/* Glow text */
.glow-text {
    text-shadow: 0 0 10px #0ea5e9;
}
</style>

</head>

<body class="text-white min-h-screen p-6">

<div class="max-w-5xl mx-auto">

```
<!-- Header -->
<div class="text-center mb-10">
    <h1 class="text-5xl font-bold glow-text">KNOWLEDGE ENGINE</h1>
    <p class="text-gray-400 mt-2">Cyberpunk Search System</p>
</div>

<!-- Login -->
<div class="card p-6 mb-6 rounded-xl neon">
    <h2 class="text-xl mb-3">Access Terminal</h2>

    <input id="username" placeholder="Username"
        class="w-full p-2 mb-2 rounded bg-black text-white">

    <input id="password" type="password"
        class="w-full p-2 mb-2 rounded bg-black text-white">

    <button onclick="login()"
        class="bg-blue-500 px-4 py-2 w-full rounded neon">
        Authenticate
    </button>
</div>

<!-- Add Note -->
<div class="card p-6 mb-6 rounded-xl neon">
    <h2 class="text-xl mb-3">Inject Knowledge</h2>

    <input id="title" placeholder="Title"
        class="w-full p-2 mb-2 rounded bg-black text-white">

    <textarea id="content"
        class="w-full p-2 mb-2 rounded bg-black text-white h-24"></textarea>

    <button onclick="addNote()"
        class="bg-purple-500 px-4 py-2 w-full rounded neon">
        Save Data
    </button>
</div>

<!-- Search -->
<div class="card p-6 mb-6 rounded-xl neon-green">
    <h2 class="text-xl mb-3">Search Database</h2>

    <div class="flex gap-2">
        <input id="query"
            class="flex-1 p-2 rounded bg-black text-white"
            placeholder="Search...">

        <button onclick="searchNotes()"
            class="bg-green-500 px-4 py-2 rounded neon-green">
            Scan
        </button>
    </div>
</div>

<!-- Results -->
<div id="results"></div>
```

</div>

<script>
const API = "https://knowledge-base-api-ly0h.onrender.com";

let TOKEN = "";
let editingId = null;

// LOGIN
async function login() {
    const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();
    TOKEN = data.access_token;
    alert("Access granted");
}

// ADD / EDIT
async function addNote() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if (editingId) {
        await fetch(`${API}/notes/${editingId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${TOKEN}`
            },
            body: JSON.stringify({title, content})
        });
        editingId = null;
    } else {
        await fetch(`${API}/notes`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${TOKEN}`
            },
            body: JSON.stringify({title, content})
        });
    }

    searchNotes();
}

// SEARCH
async function searchNotes() {
    const query = document.getElementById("query").value;

    const res = await fetch(`${API}/search?query=${query}`);
    const data = await res.json();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    data.forEach(item => {
        resultsDiv.innerHTML += `
            <div class="card p-4 mb-4 rounded-xl">
                <h2 class="text-xl font-semibold">${item.title}</h2>
                <p class="text-gray-300">${item.content}</p>

                <div class="mt-2 flex gap-2">
                    <button onclick="editNote(${item.id}, '${item.title}', '${item.content}')"
                        class="bg-yellow-500 px-2 py-1 rounded">
                        Edit
                    </button>

                    <button onclick="deleteNote(${item.id})"
                        class="bg-red-500 px-2 py-1 rounded">
                        Delete
                    </button>
                </div>
            </div>
        `;
    });
}

// EDIT
function editNote(id, title, content) {
    document.getElementById("title").value = title;
    document.getElementById("content").value = content;
    editingId = id;
}

// DELETE
async function deleteNote(id) {
    await fetch(`${API}/notes/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": `Bearer ${TOKEN}`
        }
    });

    searchNotes();
}
</script>

</body>
