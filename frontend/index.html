<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Engine</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #020617;
}

/* Layout */
.container {
    max-width: 1100px;
    margin: auto;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
}

/* Hover */
.card:hover {
    transform: translateY(-4px);
    transition: 0.25s;
}

/* Buttons */
.btn {
    padding: 10px;
    border-radius: 8px;
    font-weight: 500;
    transition: 0.2s;
}

.btn-blue { background:#3b82f6; }
.btn-green { background:#22c55e; }
.btn-red { background:#ef4444; }
.btn-yellow { background:#f59e0b; }

/* Toast */
#toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #111827;
    padding: 12px 20px;
    border-radius: 8px;
    display: none;
}
</style>

</head>

<body class="text-white">

<!-- NAVBAR -->

<div class="border-b border-gray-800 p-4 flex justify-between">
    <h1 class="text-xl font-bold">Knowledge Engine</h1>
    <span class="text-gray-400 text-sm">FastAPI + Supabase</span>
</div>

<div class="container p-4">

```
<!-- LOGIN -->
<div class="card p-4 mb-4 rounded-lg">
    <input id="username" placeholder="Username"
        class="w-full p-2 mb-2 rounded text-black">

    <input id="password" type="password"
        class="w-full p-2 mb-2 rounded text-black">

    <button onclick="login()" class="btn btn-blue w-full">Login</button>
</div>

<!-- ADD -->
<div class="card p-4 mb-4 rounded-lg">
    <input id="title" placeholder="Title"
        class="w-full p-2 mb-2 rounded text-black">

    <textarea id="content"
        class="w-full p-2 mb-2 rounded text-black h-24"></textarea>

    <button onclick="addNote()" class="btn btn-blue w-full">
        Save Note
    </button>
</div>

<!-- SEARCH -->
<div class="card p-4 mb-4 rounded-lg">
    <div class="flex flex-col md:flex-row gap-2">
        <input id="query"
            class="flex-1 p-2 rounded text-black"
            placeholder="Search...">

        <button onclick="searchNotes()"
            class="btn btn-green">
            Search
        </button>
    </div>
</div>

<!-- RESULTS -->
<div id="results" class="grid gap-4"></div>
```

</div>

<!-- TOAST -->

<div id="toast"></div>

<script>
const API = "https://knowledge-base-api-ly0h.onrender.com";

let TOKEN = "";
let editingId = null;

// Toast
function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",2000);
}

// LOGIN
async function login() {
    const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    const data = await res.json();
    TOKEN = data.access_token;
    showToast("Logged in");
}

// ADD / EDIT
async function addNote() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    const method = editingId ? "PUT" : "POST";
    const url = editingId ? `${API}/notes/${editingId}` : `${API}/notes`;

    await fetch(url, {
        method,
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${TOKEN}`
        },
        body: JSON.stringify({title, content})
    });

    editingId = null;
    showToast("Saved");
    searchNotes();
}

// SEARCH
async function searchNotes() {
    const res = await fetch(`${API}/search?query=${query.value}`);
    const data = await res.json();

    results.innerHTML = "";

    data.forEach(item => {
        results.innerHTML += `
        <div class="card p-4 rounded-lg">
            <h2 class="text-lg font-semibold">${item.title}</h2>
            <p class="text-gray-300">${item.content}</p>

            <div class="mt-2 flex gap-2 flex-wrap">
                <button onclick="editNote(${item.id}, '${item.title}', '${item.content}')"
                    class="btn btn-yellow">Edit</button>

                <button onclick="deleteNote(${item.id})"
                    class="btn btn-red">Delete</button>
            </div>
        </div>
        `;
    });
}

// EDIT
function editNote(id, title, content) {
    document.getElementById("title").value = title;
    document.getElementById("content").value = content;
    editingId = id;
}

// DELETE
async function deleteNote(id) {
    await fetch(`${API}/notes/${id}`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${TOKEN}` }
    });

    showToast("Deleted");
    searchNotes();
}
</script>

</body>
</html>
