<!DOCTYPE html>

<html lang="en">
<head>

<style>
body {
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
}
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
}
.card:hover {
    transform: scale(1.02);
    transition: 0.3s;
}
</style>

</head>

<body class="text-white min-h-screen flex flex-col items-center p-6">

<div class="w-full max-w-4xl">

```
<!-- HEADER -->
<div class="text-center mb-8">
    <h1 class="text-5xl font-bold">Knowledge Engine</h1>
    <p class="text-gray-400 mt-2">Smart searchable knowledge system</p>
</div>

<!-- LOGIN -->
<div class="glass p-6 rounded-xl mb-6">
    <h2 class="text-xl mb-3">Login</h2>

    <input id="username" placeholder="Username"
        class="w-full p-2 mb-2 rounded text-black">

    <input id="password" type="password" placeholder="Password"
        class="w-full p-2 mb-2 rounded text-black">

    <button onclick="login()"
        class="bg-purple-500 hover:bg-purple-600 px-4 py-2 w-full rounded">
        Login
    </button>
</div>

<!-- ADD NOTE -->
<div class="glass p-6 rounded-xl mb-6">
    <h2 class="text-xl mb-3">Add / Edit Note</h2>

    <input id="title" placeholder="Title"
        class="w-full p-2 mb-2 rounded text-black">

    <textarea id="content" placeholder="Content"
        class="w-full p-2 mb-2 rounded text-black h-24"></textarea>

    <button onclick="addNote()"
        class="bg-blue-500 hover:bg-blue-600 px-4 py-2 w-full rounded">
        Save Note
    </button>
</div>

<!-- SEARCH -->
<div class="glass p-6 rounded-xl mb-6">
    <h2 class="text-xl mb-3">Search</h2>

    <div class="flex gap-2">
        <input id="query" placeholder="Search..."
            class="flex-1 p-2 rounded text-black">

        <button onclick="searchNotes()"
            class="bg-green-500 px-4 py-2 rounded">
            Search
        </button>
    </div>

<!-- RESULTS -->
<div id="results"></div>
```

</div>

<script>
const API = "https://knowledge-base-api-ly0h.onrender.com";

let TOKEN = "";
let editingId = null;

// LOGIN
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username, password})
    });

    const data = await res.json();
    TOKEN = data.access_token;

    alert("Logged in successfully");
}

// ADD / EDIT NOTE
async function addNote() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if (!title || !content) {
        alert("Fill all fields");
        return;
    }

    if (editingId) {
        await fetch(`${API}/notes/${editingId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${TOKEN}`
            },
            body: JSON.stringify({title, content})
        });

        editingId = null;
    } else {
        await fetch(`${API}/notes`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${TOKEN}`
            },
            body: JSON.stringify({title, content})
        });
    }

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

    searchNotes();
}

// SEARCH
async function searchNotes() {
    const query = document.getElementById("query").value;

    const res = await fetch(`${API}/search?query=${query}`);
    const data = await res.json();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (!data.length) {
        resultsDiv.innerHTML = "<p class='text-gray-400'>No results found</p>";
        return;
    }

    data.forEach(item => {
        resultsDiv.innerHTML += `
            <div class="glass p-4 mb-4 rounded-xl card">
                <h2 class="text-xl font-semibold">${item.title}</h2>
                <p class="text-gray-300">${item.content}</p>
                <small>Score: ${item.score.toFixed(3)}</small>

                <div class="mt-2 flex gap-2">
                    <button onclick="editNote(${item.id}, '${item.title}', '${item.content}')"
                        class="bg-yellow-500 px-2 py-1 rounded">
                        Edit
                    </button>

                    <button onclick="deleteNote(${item.id})"
                        class="bg-red-500 px-2 py-1 rounded">
                        Delete
                    </button>
                </div>
            </div>
        `;
    });
}

// EDIT
function editNote(id, title, content) {
    document.getElementById("title").value = title;
    document.getElementById("content").value = content;
    editingId = id;
}

// DELETE
async function deleteNote(id) {
    await fetch(`${API}/notes/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": `Bearer ${TOKEN}`
        }
    });

    searchNotes();
}
</script>

</body>
</html>
