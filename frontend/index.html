<script>
const API = "https://knowledge-base-api-ly0h.onrender.com";

// Highlight
function highlight(text, query) {
    if (!query) return text;
    const words = query.split(" ");
    words.forEach(word => {
        const regex = new RegExp(`(${word})`, "gi");
        text = text.replace(regex, "<span class='text-yellow-400'>$1</span>");
    });
    return text;
}

// Add Note
async function addNote() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    await fetch(`${API}/notes`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({title, content})
    });

    alert("Added successfully");
}

// Search
async function searchNotes() {
    const query = document.getElementById("query").value;

    const res = await fetch(`${API}/search?query=${query}`);
    const data = await res.json();

    console.log(data);

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (!data.length) {
        resultsDiv.innerHTML = "<p class='text-gray-400'>No results found</p>";
        return;
    }

    data.forEach(item => {
        resultsDiv.innerHTML += `
            <div class="glass p-4 mb-4 rounded-xl hover:scale-[1.02] transition">
                <h2 class="text-xl font-semibold mb-1">
                    ${highlight(item.title, query)}
                </h2>
                <p class="text-gray-300 mb-2">
                    ${highlight(item.content, query)}
                </p>
                <small class="text-gray-500">
                    Score: ${item.score.toFixed(3)}
                </small>
            </div>
        `;
    });
}
</script>
