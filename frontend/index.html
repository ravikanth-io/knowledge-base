<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen flex flex-col items-center p-6">

<!-- Header -->

<!-- Add Note Card -->
<div class="bg-gray-800 p-5 rounded-xl shadow mb-6">
    <h2 class="text-xl font-semibold mb-3">Add Note</h2>

    <input id="title" placeholder="Title"
        class="p-2 text-black w-full mb-3 rounded">

    <textarea id="content" placeholder="Content"
        class="p-2 text-black w-full mb-3 rounded h-24"></textarea>

    <button onclick="addNote()"
        class="bg-blue-500 hover:bg-blue-600 px-4 py-2 w-full rounded font-medium">
        Add Note
    </button>
</div>

<!-- Search Card -->
<div class="bg-gray-800 p-5 rounded-xl shadow mb-6">
    <h2 class="text-xl font-semibold mb-3">Search</h2>

    <input id="query" placeholder="Search your notes..."
        class="p-2 text-black w-full mb-3 rounded">

    <button onclick="searchNotes()"
        class="bg-green-500 hover:bg-green-600 px-4 py-2 w-full rounded font-medium">

```

</div>

<script>
const API = "https://knowledge-base-api-ly0h.onrender.com";

// Highlight keywords
function highlight(text, query) {
    if (!query) return text;

    const words = query.split(" ");
    words.forEach(word => {
        const regex = new RegExp(`(${word})`, "gi");
        text = text.replace(regex, "<mark class='bg-yellow-300 text-black'>$1</mark>");
    });
    return text;
}

// Show loader
function toggleLoader(show) {
    document.getElementById("loader").classList.toggle("hidden", !show);
}

// Add Note
async function addNote() {
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();

    if (!title || !content) {
        alert("Please fill all fields");
        return;
    }

    toggleLoader(true);

    await fetch(`${API}/notes`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({title, content})
    });

    toggleLoader(false);

    alert("Note added successfully");

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
}

// Search Notes
async function searchNotes() {
    const query = document.getElementById("query").value.trim();

    toggleLoader(true);

    const res = await fetch(`${API}/search?query=${query}`);
    const data = await res.json();

    toggleLoader(false);

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (data.length === 0) {
        resultsDiv.innerHTML = `
            <p class="text-gray-400 text-center">No results found</p>
        `;
        return;
    }

    data.forEach(item => {
        resultsDiv.innerHTML += `
            <div class="bg-gray-800 p-4 mb-3 rounded-xl shadow hover:scale-[1.01] transition">
                <h2 class="text-xl font-semibold mb-1">
                    ${highlight(item.title, query)}
                </h2>
                <p class="text-gray-300 mb-2">
                    ${highlight(item.content, query)}
                </p>
                <small class="text-gray-500">
                    Relevance Score: ${item.score.toFixed(3)}
                </small>
            </div>
        `;
    });
}
</script>

</body>
</html>
